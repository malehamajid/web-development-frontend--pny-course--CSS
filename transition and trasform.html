<!DOCTYPE html>
<html>
    <head>
        <style>
            .main{
                width: 400px;
                height: 200px;
                background-color: yellow;
                border: 2px solid black;
                animation-name: abc;
                animation-duration: 10s;
                animation-delay: 10s;
                margin-left: 120px;
            }
            @keyframes abc{
                from{
                    transform: rotate(180deg);
                }
                to{
                    transform: rotate(360deg);
                }
            }
            .eclips{
                height: 400px;
                width: 600px;
                color: black;
                border-radius: 20px;
            }
        </style>
    </head>
    <body>
        <div class="main">
            ABC
        </div>
        <br><br>
        <div class="eclips">

        </div>

    </body>
</html>
