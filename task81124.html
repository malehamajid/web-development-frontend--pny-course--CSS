<!DOCTYPE html>
<html>
    <head>
        <style>
            .ty{
                text-align: center;
                margin-top: 280px;
                animation: op 20s ease-in 2s 5;
            }
            @keyframes op{
                20%{
                    color: blue;
                    font-size: 30px;
                }
                40%{
                    color: blueviolet;
                    font-size: 60px;
                }
                60%{
                    color: purple;
                    font-size: 90px;
                }
                80%{
                    color: peru;
                    font-size: 120px;
                }
                100%{
                    color: lawngreen;
                    font-size: 150px;
                }
            }
        </style>

    </head>
    <body>
        <h1 class="ty">MALEHA MAJID</h1>
    </body>
</html>
